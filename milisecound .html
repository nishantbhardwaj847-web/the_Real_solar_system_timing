<!DOCTYPE html>
<html>
<head>
    <title>Live Time & Earth Sync</title>
    <style>
        body { margin: 0; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; perspective: 1500px; font-family: 'Segoe UI', sans-serif; }
        
        /* Control Panel */
        #controls { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0, 0, 0, 0.9); border: 2px solid #00c8ff; 
            padding: 20px; border-radius: 15px; z-index: 200; width: 220px;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
        }
        #controls h3 { margin: 0 0 10px 0; font-size: 14px; color: #00c8ff; text-align: center; text-transform: uppercase; }
        .speed-text { display: block; text-align: center; margin-bottom: 10px; color: #ffcc00; font-weight: bold; font-size: 18px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00c8ff; }

        /* Time Counter */
        #time-block { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.9); border: 1px solid #ffcc00; 
            padding: 15px; border-radius: 10px; color: #fff; z-index: 100; min-width: 180px; 
        }
        .counter-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
        .counter-val { font-size: 22px; font-weight: bold; font-family: monospace; }
        .ms-val { color: #ffcc00; font-size: 16px; }
        .label { font-size: 10px; color: #ffcc00; text-transform: uppercase; opacity: 0.8; }

        /* Universe & Objects */
        #universe { position: relative; width: 100vw; height: 100vh; transform-style: preserve-3d; transform: rotateX(65deg); }
        .sun { 
            position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; 
            background: radial-gradient(circle, #fff 0%, #ffcc00 40%, #ff4500 100%); 
            border-radius: 50%; box-shadow: 0 0 60px #ff4500; 
            transform: translate(-50%, -50%) rotateX(-65deg); 
        }

        .earth-orbit { 
            position: absolute; top: 50%; left: 50%; width: 450px; height: 450px; 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50%; 
            transform: translate(-50%, -50%); transform-style: preserve-3d; 
        }
        .earth-node { position: absolute; top: 50%; right: -25px; transform-style: preserve-3d; }
        .earth { 
            width: 50px; height: 50px; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/b/bb/Equirectangular_projection_SW.jpg'); 
            background-size: cover; border-radius: 50%; 
            box-shadow: inset 12px 0 20px #000, 0 0 15px rgba(0, 200, 255, 0.3);
            transform-style: preserve-3d;
        }

        .stars { position: absolute; width: 200%; height: 200%; background: url('https://www.transparenttextures.com/patterns/stardust.png') repeat; opacity: 0.3; z-index: -1; }
    </style>
</head>
<body>

    <!-- Speed Control UI -->
    <div id="controls">
        <h3>Time Controller</h3>
        <span id="speed-display" class="speed-text">1x Speed</span>
        <input type="range" id="speed-slider" min="0" max="2000" value="100">
        <div style="font-size: 10px; color: #888; margin-top: 10px; text-align: center;">Dhire <-----------> Tej</div>
    </div>

    <!-- Live Timer -->
    <div id="time-block">
        <div class="counter-row"><span id="day-count" class="counter-val">00</span><span class="label">Days</span></div>
        <div class="counter-row"><span id="hour-count" class="counter-val">00</span><span class="label">Hours</span></div>
        <div class="counter-row"><span id="min-count" class="counter-val">00</span><span class="label">Mins</span></div>
        <div class="counter-row"><span id="sec-count" class="counter-val">00</span><span class="label">Secs</span></div>
        <div class="counter-row"><span id="ms-count" class="counter-val ms-val">000</span><span class="label">M-Sec</span></div>
    </div>

    <div class="stars"></div>
    <div id="universe">
        <div id="sun-model" class="sun"></div>
        <div id="earth-orbit-el" class="earth-orbit">
            <div class="earth-node">
                <div id="earth-model" class="earth"></div>
            </div>
        </div>
    </div>

    <script>
        const speedSlider = document.getElementById('speed-slider');
        const speedDisplay = document.getElementById('speed-display');
        const earthModel = document.getElementById('earth-model');
        const earthOrbitEl = document.getElementById('earth-orbit-el');
        
        let totalMs = 0;
        let speedFactor = 100; // Yeh hamari simulation speed hai

        function mainLoop() {
            // Speed factor ke mutabiq time ko aage badhana
            // 16.67ms (ek frame) ko speedFactor se multiply kar rahe hain
            totalMs += (16.67 * speedFactor);

            // 1. Timer Update Logic
            let d = Math.floor(totalMs / 86400000);
            let h = Math.floor((totalMs % 86400000) / 3600000);
            let m = Math.floor((totalMs % 3600000) / 60000);
            let s = Math.floor((totalMs % 60000) / 1000);
            let ms = Math.floor(totalMs % 1000);

            document.getElementById('day-count').innerText = d.toString().padStart(2, '0');
            document.getElementById('hour-count').innerText = h.toString().padStart(2, '0');
            document.getElementById('min-count').innerText = m.toString().padStart(2, '0');
            document.getElementById('sec-count').innerText = s.toString().padStart(2, '0');
            document.getElementById('ms-count').innerText = ms.toString().padStart(3, '0');

            // 2. Earth Rotation Sync (The real magic)
            // Earth ko 24 ghante (simulation time) mein 360 degree ghumna hai
            let dayFraction = (totalMs % 86400000) / 86400000;
            let earthSpin = dayFraction * 360;
            earthModel.style.transform = `rotateX(-65deg) rotateY(${earthSpin}deg)`;

            // 3. Earth Orbit Sync (365 days mein ek chakkar)
            let yearFraction = (totalMs % (365 * 86400000)) / (365 * 86400000);
            let earthOrbit = yearFraction * 360;
            earthOrbitEl.style.transform = `translate(-50%, -50%) rotateZ(${earthOrbit}deg)`;

            requestAnimationFrame(mainLoop);
        }

        // Slider change hone par speed badalna
        speedSlider.addEventListener('input', (e) => {
            speedFactor = parseInt(e.target.value);
            speedDisplay.innerText = (speedFactor / 100).toFixed(1) + "x Speed";
        });

        // Simulation shuru karein
        requestAnimationFrame(mainLoop);

        // Universe Rotation (Mouse Control)
        let rx = 65, rz = 0, isDown = false, lx, ly;
        document.onmousedown = (e) => { isDown = true; lx = e.clientX; ly = e.clientY; };
        document.onmouseup = () => isDown = false;
        document.onmousemove = (e) => {
            if(!isDown) return;
            rz += (e.clientX - lx) * 0.3;
            rx -= (e.clientY - ly) * 0.3;
            rx = Math.max(10, Math.min(85, rx));
            document.getElementById('universe').style.transform = `rotateX(${rx}deg) rotateZ(${rz}deg)`;
            document.getElementById('sun-model').style.transform = `translate(-50%, -50%) rotateX(${-rx}deg)`; 
            lx = e.clientX; ly = e.clientY;
        };
    </script>
</body>
</html>
